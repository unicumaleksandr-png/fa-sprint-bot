name: "📈 Еженедельный разбор (воскресенье 20:00 МСК)"

on:
  schedule:
    - cron: "0 17 * * 0"   # 17:00 UTC воскресенье = 20:00 МСК
  workflow_dispatch:

permissions:
  contents: write

jobs:
  weekly-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Отправить еженедельный разбор
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID:   ${{ secrets.CHAT_ID }}
        run: python bot/send_weekly.py

      - name: Сохранить обновлённый state
        run: |
          git config user.name  "FA Bot"
          git config user.email "bot@fa-sprint.local"
          git add state/progress.json
          git diff --cached --quiet || git commit -m "bot: weekly $(date +%Y-%m-%d)"
          git push
