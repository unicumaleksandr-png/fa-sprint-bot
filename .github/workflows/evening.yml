name: "🌙 Вечерний чек-ин (21:00 МСК)"

on:
  schedule:
    - cron: "0 18 * * *"   # 18:00 UTC = 21:00 МСК
  workflow_dispatch:

permissions:
  contents: read

jobs:
  send-evening:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Отправить вечерний чек-ин
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID:   ${{ secrets.CHAT_ID }}
        run: python bot/send_evening.py
